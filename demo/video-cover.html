<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@300;400&family=IBM+Plex+Mono:wght@400&display=swap');
:root {
  --plate:#040A12; --ink:#DBD7CF; --dim:#78746D; --star:#F6B755; --moon:#5D8BB4; --hair:#252F39;
}
* { margin:0; box-sizing:border-box; }
html,body { width:1920px; height:1080px; background:var(--plate); color:var(--ink); font-family:"IBM Plex Sans",sans-serif; font-weight:300; overflow:hidden; position:relative; }
.wrap { padding:130px 170px; }
.star { font-size:88px; color:var(--star); line-height:1; filter:drop-shadow(0 0 24px rgba(246,183,85,0.55)); }
h1 { font-family:"Instrument Serif",serif; font-weight:400; font-size:172px; color:var(--ink); letter-spacing:0.04em; margin:18px 0 0; line-height:0.95; }
.tag { font-family:"Instrument Serif",serif; font-style:italic; font-weight:400; font-size:62px; color:var(--ink); margin:48px 0 0; line-height:1.15; }
.kicker { font-family:"Instrument Serif",serif; font-style:italic; font-size:42px; color:var(--star); margin:24px 0 0; }
.cat { font-family:"IBM Plex Mono",monospace; font-size:20px; letter-spacing:0.22em; text-transform:uppercase; color:var(--dim); margin-top:80px; line-height:1.6; }
.colophon { position:absolute; bottom:84px; left:170px; font-family:"IBM Plex Mono",monospace; font-size:18px; letter-spacing:0.10em; line-height:1.9; color:var(--dim); }
</style>
</head>
<body>
<div class="wrap">
  <div class="star">✦</div>
  <h1>LEAVITT</h1>
  <div class="tag">On-Call AI Agent,<br>Turns Alerts Into Answers</div>
  <div class="kicker">Leave it to Leavitt.</div>
  <div class="cat">Incident triage &nbsp;·&nbsp; built on Theodosia</div>
</div>
<div class="colophon">
Adam Munawar Rahman &nbsp;·&nbsp; SWE @ IBM &nbsp;·&nbsp; M.S. Computer Engineering, NYU Tandon<br>
DevNetwork [AI + ML] Hackathon 2026 &nbsp;·&nbsp; AI DevSummit
</div>
</body>
</html>
