<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap');
:root {
  --plate:#040A12; --panel:#09121C; --ink:#DBD7CF; --dim:#78746D; --star:#F6B755; --moon:#5D8BB4; --hair:#252F39;
}
* { margin:0; box-sizing:border-box; }
html,body { width:1600px; height:300px; background:var(--plate); color:var(--ink); font-family:"IBM Plex Sans",sans-serif; font-weight:300; overflow:hidden; }
.wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; gap:54px;
  background:radial-gradient(120% 160% at 50% -30%, rgba(246,183,85,0.10), transparent 60%); }
.laurel { font-size:170px; color:var(--star); line-height:1; filter:drop-shadow(0 0 22px rgba(246,183,85,0.45)); }
.mid { display:flex; flex-direction:column; align-items:center; text-align:center; }
.eyebrow { font-family:"IBM Plex Mono",monospace; font-size:21px; letter-spacing:0.34em; text-transform:uppercase; color:var(--star); }
.title { font-family:"Instrument Serif",serif; font-weight:400; font-size:76px; color:var(--ink); line-height:1.02; margin:14px 0 0; }
.sub { font-family:"IBM Plex Mono",monospace; font-size:20px; letter-spacing:0.16em; color:var(--dim); margin-top:18px; }
.rule { width:520px; height:1px; background:var(--hair); margin:20px 0 0; }
.kicker { font-family:"Instrument Serif",serif; font-style:italic; font-size:30px; color:var(--star); margin-top:16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="laurel">&#127942;</div>
  <div class="mid">
    <div class="eyebrow">Challenge Winner&nbsp;·&nbsp;DevNetwork [AI&nbsp;+&nbsp;ML] Hackathon 2026</div>
    <div class="title">Crusoe: Hermes&nbsp;/&nbsp;Nemotron Agent</div>
    <div class="rule"></div>
    <div class="sub">Nvidia Nemotron on Crusoe Cloud Managed Inference&nbsp;·&nbsp;AI DevSummit</div>
    <div class="kicker">Leave it to Leavitt.</div>
  </div>
  <div class="laurel">&#127942;</div>
</div>
</body>
</html>
