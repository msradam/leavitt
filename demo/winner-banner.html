<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@300;400&family=IBM+Plex+Mono:wght@400&display=swap');
:root {
  --plate:#040A12; --ink:#DBD7CF; --dim:#78746D; --star:#F6B755; --hair:#252F39;
}
* { margin:0; box-sizing:border-box; }
html,body { width:1600px; height:260px; background:var(--plate); color:var(--ink); font-family:"IBM Plex Sans",sans-serif; font-weight:300; overflow:hidden; }
.wrap { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.eyebrow { display:flex; align-items:center; gap:22px; font-family:"IBM Plex Mono",monospace; font-size:22px; letter-spacing:0.40em; text-transform:uppercase; color:var(--star); }
.eyebrow .dash { width:64px; height:1px; background:var(--star); opacity:0.5; }
.title { font-family:"Instrument Serif",serif; font-weight:400; font-size:52px; color:var(--ink); margin:26px 0 0; letter-spacing:0.01em; }
.sub { font-family:"IBM Plex Mono",monospace; font-size:19px; letter-spacing:0.18em; color:var(--dim); margin-top:22px; text-transform:uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow"><span class="dash"></span>&#10022;&nbsp;&nbsp;Challenge Winner&nbsp;&nbsp;&#10022;<span class="dash"></span></div>
  <div class="title">Crusoe: Hermes&nbsp;/&nbsp;Nemotron Agent on Crusoe Cloud</div>
  <div class="sub">DevNetwork [AI&nbsp;+&nbsp;ML] Hackathon 2026&nbsp;&nbsp;·&nbsp;&nbsp;AI DevSummit</div>
</div>
</body>
</html>
