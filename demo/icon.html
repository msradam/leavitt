<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; }
  html, body { width: 512px; height: 512px; background: #040A12; overflow: hidden; }
  .wrap { width: 512px; height: 512px; position: relative; display: flex; align-items: center; justify-content: center; }
  /* faint period-luminosity hint: a few star points on a diagonal */
  .dot { position: absolute; width: 7px; height: 7px; border-radius: 50%; background: #F6B755; opacity: 0.22; }
  .star { font-size: 300px; line-height: 1; color: #F6B755; filter: drop-shadow(0 0 46px rgba(246,183,85,0.55)); }
</style>
</head>
<body>
<div class="wrap">
  <div class="dot" style="left:96px;  top:372px;"></div>
  <div class="dot" style="left:150px; top:338px;"></div>
  <div class="dot" style="left:362px; top:174px;"></div>
  <div class="dot" style="left:416px; top:140px;"></div>
  <div class="star">&#10022;</div>
</div>
</body>
</html>
